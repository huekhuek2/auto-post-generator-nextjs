name: Daily Auto Post (KST)

on:
  schedule:
    # 8:00 AM KST = 23:00 PM UTC (Previous Day)
    - cron: '0 23 * * *'
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  trigger-auto-post:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Auto-Post API
        run: |
          echo "Triggering Auto-Post API..."
          response=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://auto-post-generator-nextjs.vercel.app/api/auto-post")
          
          if [ "$response" -eq 200 ]; then
            echo "Success: API returned 200 OK"
          else
            echo "Error: API returned status $response"
            exit 1
          fi
